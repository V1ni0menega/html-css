<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOdelo de caixa</title>
    <style>
        h1{/*box-level*/

            /* da para simplificar tudo isso usando shorthands..border:10 px solid e color, ou seja usar shorthand para simplificar o codigo ,de  declara-se tudo em uma linha */
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: wheat;

            /* border: .....*/

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px ;
            padding-left: 10px;
            /*padding: 10px 5px 10px 20px 
            ou se os valores forem todo iguais , declarar somente uma vez .....*/


            margin-top:10px;
            margin-right:10px ;
            margin-bottom:10px ;
            margin-left: 10px;

            outline-width: 4px;
            outline-style: dashed;
            outline-color: black;

        }
        a{/*box-level*/
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1> exemplo de caixa box-level</h1>
    <p>paragrafos tambem sao exemplos de nox=level, mas os <a href=""> links são eemplos de inline-level</a></p>
</body>
</html>
